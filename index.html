            <!DOCTYPE html>
<html>
<head>
    <title>CRITICAL_ACCESS_REQUIRED</title>
    <style>
        body {
            background-color: #000;
            color: #0d0;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        #terminal {
            white-space: pre-wrap;
            line-height: 1.1;
            font-size: 13px;
            text-shadow: 0 0 2px #0d0;
        }

        .success { color: #fff; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #fff; background: #050; }
        .warning { color: #ff0; font-style: italic; }
        .critical { color: #f00; font-weight: bold; animation: pulse 0.5s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        button {
            background: #000;
            border: 2px solid #fff;
            color: #fff;
            padding: 20px 40px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            cursor: pointer;
            display: none;
            margin: 50px auto;
            display: none;
            box-shadow: 0 0 20px #fff;
        }
        button:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

<div id="terminal"></div>
<center><button id="actionBtn" onclick="window.location.href='ТВОЯ_ССЫЛКА_ТУТ'">[ ПОЛУЧИТЬ ДОСТУП К АРХИВУ ]</button></center>

<script>
    const terminal = document.getElementById('terminal');
    const btn = document.getElementById('actionBtn');

    function addLine(text, type = '') {
        const p = document.createElement('div');
        if (type) p.className = type;
        p.textContent = text;
        terminal.appendChild(p);
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function startHacking() {
        // Начало
        addLine("> ИНИЦИАЛИЗАЦИЯ ВЗЛОМА...");
        await new Promise(r => setTimeout(r, 1000));
        
        // Огромный каскад (300 строк)
        for(let i = 0; i < 300; i++) {
            let hex1 = Math.random().toString(16).toUpperCase().substring(2, 10);
            let hex2 = Math.random().toString(16).toUpperCase().substring(2, 6);
            let status = Math.random() > 0.9 ? "[КРИТИЧЕСКАЯ ОШИБКА]" : "[OK]";
            
            addLine(`СЕКТОР_${hex2} | ПОТОК:${hex1} | СТАТУС: ${status} | MEM_LOAD: ${Math.floor(Math.random()*100)}%`, 
                    status === "[КРИТИЧЕСКАЯ ОШИБКА]" ? 'warning' : '');
            
            // Очень высокая скорость для каскада
            await new Promise(r => setTimeout(r, 15)); 
        }

        // Финальные команды
        addLine("\n> ОБХОД ЗАЩИТЫ ЗАВЕРШЕН...", 'success');
        await new Promise(r => setTimeout(r, 800));
        addLine("> ИЗВЛЕЧЕНИЕ ПАРОЛЕЙ...", 'warning');
        await new Promise(r => setTimeout(r, 1200));
        addLine("> ОШИБКА СИСТЕМЫ: ОБНАРУЖЕН СЛЕД АДМИНИСТРАТОРА!", 'critical');
        await new Promise(r => setTimeout(r, 1000));
        addLine("> ПЕРЕНАПРАВЛЕНИЕ ТРАФИКА... УСПЕШНО.");
        await new Promise(r => setTimeout(r, 500));
        addLine("\n=== ДОСТУП РАЗРЕШЕН ===", 'success');
        
        // Показ кнопки
        btn.style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }

    startHacking();
</script>

</body>
</html>
