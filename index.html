<!DOCTYPE html>
<html>
<head>
    <title>CRITICAL_ACCESS_REQUIRED</title>
    <style>
        body {
            background-color: #000;
            color: #0d0;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        #terminal {
            white-space: pre-wrap;
            line-height: 1.1;
            font-size: 13px;
            text-shadow: 0 0 2px #0d0;
        }

        .success { color: #fff; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #fff; }
        .warning { color: #ff0; }
        .critical { color: #f00; font-weight: bold; animation: pulse 0.5s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        button {
            background: #000;
            border: 2px solid #0d0;
            color: #0d0;
            padding: 20px 40px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            cursor: pointer;
            display: none;
            margin: 50px auto;
            box-shadow: 0 0 15px #0d0;
            text-transform: uppercase;
        }
        button:hover { background: #0d0; color: #000; }
    </style>
</head>
<body>

<div id="terminal"></div>
<center><button id="actionBtn" onclick="alert('СИСТЕМА: Файл успешно расшифрован и сохранен в локальное хранилище.')">[ СКАЧАТЬ ДАННЫЕ ]</button></center>

<script>
    const terminal = document.getElementById('terminal');
    const btn = document.getElementById('actionBtn');

    function addLine(text, type = '') {
        const p = document.createElement('div');
        if (type) p.className = type;
        p.textContent = text;
        terminal.appendChild(p);
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function startHacking() {
        addLine("> ИНИЦИАЛИЗАЦИЯ ВЗЛОМА...");
        await new Promise(r => setTimeout(r, 800));
        
        // Каскад данных (500 строк для эффекта "ВАУ")
        for(let i = 0; i < 500; i++) {
            let hex1 = Math.random().toString(16).toUpperCase().substring(2, 12);
            let hex2 = Math.random().toString(16).toUpperCase().substring(2, 6);
            let status = Math.random() > 0.98 ? "[КРИТИЧЕСКАЯ ОШИБКА]" : "[OK]";
            
            addLine(`BLOCK_${hex2} >> ADDR:${hex1} >> STATUS: ${status}`, 
                    status === "[КРИТИЧЕСКАЯ ОШИБКА]" ? 'critical' : '');
            
            // Очень быстро
            await new Promise(r => setTimeout(r, 10)); 
        }

        // Финал
        addLine("\n> СТРУКТУРА ДАННЫХ ВОССТАНОВЛЕНА.", 'success');
        await new Promise(r => setTimeout(r, 600));
        addLine("> ПОДГОТОВКА К ЗАГРУЗКЕ...", 'warning');
        await new Promise(r => setTimeout(r, 1000));
        addLine("\n=== ДОСТУП ОТКРЫТ ===", 'success');
        
        btn.style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }

    startHacking();
</script>

</body>
</html>
